spring:
  main:
    allow-bean-definition-overriding: true
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://localhost:9999/not-used
  jpa:
    hibernate:
      ddl-auto: create-drop
  task:
    scheduling:
      pool:
        size: 1
