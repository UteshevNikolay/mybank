spring:
  application:
    name: accounts
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://localhost:8080/realms/mybank/protocol/openid-connect/certs
      client:
        provider:
          keycloak:
            issuer-uri: http://localhost:8080/realms/mybank
            token-uri: http://localhost:8080/realms/mybank/protocol/openid-connect/token
        registration:
          accounts-service:
            provider: keycloak
            client-id: accounts-service
            client-secret: accounts-service-secret
            authorization-grant-type: client_credentials
            scope: openid
  cloud:
    consul:
      host: localhost
      port: 8500
      discovery:
        register: true
        instance-id: ${spring.application.name}:${random.value}
  datasource:
    url: jdbc:postgresql://localhost:5433/accounts_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 8081
