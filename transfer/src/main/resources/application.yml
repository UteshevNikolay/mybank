spring:
  application:
    name: transfer
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5435/transfer_db}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${KEYCLOAK_JWK_SET_URI:http://localhost:8080/realms/mybank/protocol/openid-connect/certs}
      client:
        provider:
          keycloak:
            token-uri: ${KEYCLOAK_TOKEN_URI:http://localhost:8080/realms/mybank/protocol/openid-connect/token}
        registration:
          transfer-service:
            provider: keycloak
            client-id: transfer-service
            client-secret: ${TRANSFER_SERVICE_CLIENT_SECRET:transfer-secret}
            authorization-grant-type: client_credentials
            scope: openid

server:
  port: 8084

accounts:
  url: ${ACCOUNTS_URL:http://localhost:8081}

notifications:
  url: ${NOTIFICATIONS_URL:http://localhost:8085}

resilience4j:
  circuitbreaker:
    configs:
      default:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
    instances:
      accounts:
        base-config: default

management:
  endpoints:
    web:
      exposure:
        include: health
