apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-transfer
  labels:
    app: transfer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: transfer
  template:
    metadata:
      labels:
        app: transfer
    spec:
      containers:
        - name: transfer
          image: "{{ .Values.global.transfer.image.repository }}:{{ .Values.global.transfer.image.tag }}"
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8084
          envFrom:
            - configMapRef:
                name: {{ .Release.Name }}-transfer-config
            - secretRef:
                name: {{ .Release.Name }}-transfer-secret
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8084
            initialDelaySeconds: 60
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8084
            initialDelaySeconds: 120
            periodSeconds: 15
