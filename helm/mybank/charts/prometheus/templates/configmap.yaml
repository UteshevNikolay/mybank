apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-prometheus-config
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    rule_files:
      - "alert-rules.yml"

    scrape_configs:
      - job_name: 'accounts'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['{{ .Release.Name }}-accounts:8081']

      - job_name: 'cash'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['{{ .Release.Name }}-cash:8083']

      - job_name: 'transfer'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['{{ .Release.Name }}-transfer:8084']

      - job_name: 'notifications'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['{{ .Release.Name }}-notifications:8085']

      - job_name: 'frontend'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['{{ .Release.Name }}-frontend:8082']

  alert-rules.yml: |
    groups:
      - name: mybank-alerts
        rules:
          - alert: HighErrorRate
            expr: sum(rate(http_server_requests_seconds_count{status=~"5.."}[5m])) by (job) / sum(rate(http_server_requests_seconds_count[5m])) by (job) > 0.05
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: "High 5xx error rate on {{ "{{ $labels.job }}" }}"
              description: "Error rate is above 5% for more than 2 minutes"

          - alert: HighLatency
            expr: histogram_quantile(0.95, sum(rate(http_server_requests_seconds_bucket[5m])) by (le, job)) > 2
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "High p95 latency on {{ "{{ $labels.job }}" }}"
              description: "p95 latency is above 2 seconds for more than 5 minutes"

          - alert: CashWithdrawalFailures
            expr: rate(cash_withdrawal_failed_total[5m]) > 0.1
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "High rate of failed cash withdrawals"
              description: "Failed withdrawal rate is above 0.1/s for 5 minutes"

          - alert: TransferFailures
            expr: rate(transfer_failed_total[5m]) > 0.1
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "High rate of failed transfers"
              description: "Failed transfer rate is above 0.1/s for 5 minutes"
