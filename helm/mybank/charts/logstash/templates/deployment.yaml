apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-logstash
  labels:
    app: logstash
spec:
  replicas: 1
  selector:
    matchLabels:
      app: logstash
  template:
    metadata:
      labels:
        app: logstash
    spec:
      containers:
        - name: logstash
          image: docker.elastic.co/logstash/logstash:8.17.0
          ports:
            - containerPort: 5000
          env:
            - name: LS_JAVA_OPTS
              value: -Xms256m -Xmx256m
          volumeMounts:
            - name: pipeline
              mountPath: /usr/share/logstash/pipeline
            - name: config
              mountPath: /usr/share/logstash/config/logstash.yml
              subPath: logstash.yml
          readinessProbe:
            tcpSocket:
              port: 5000
            initialDelaySeconds: 60
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 5000
            initialDelaySeconds: 120
            periodSeconds: 15
      volumes:
        - name: pipeline
          configMap:
            name: {{ .Release.Name }}-logstash-pipeline
        - name: config
          configMap:
            name: {{ .Release.Name }}-logstash-config
