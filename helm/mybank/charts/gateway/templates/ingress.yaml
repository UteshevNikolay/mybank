apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}-gateway-ingress
spec:
  ingressClassName: traefik
  rules:
    - http:
        paths:
          - path: /accounts
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}-accounts
                port:
                  number: 8081
          - path: /cash
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}-cash
                port:
                  number: 8083
          - path: /transfer
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}-transfer
                port:
                  number: 8084
          - path: /notifications
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}-notifications
                port:
                  number: 8085
