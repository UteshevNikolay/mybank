apiVersion: v1
kind: Pod
metadata:
  name: {{ .Release.Name }}-notifications-test
  annotations:
    "helm.sh/hook": test
spec:
  containers:
    - name: wget
      image: busybox:1.36
      command: ['wget']
      args: ['{{ .Release.Name }}-notifications:8085/actuator/health']
  restartPolicy: Never
