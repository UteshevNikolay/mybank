apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-accounts-secret
type: Opaque
data:
  SPRING_DATASOURCE_USERNAME: {{ .Values.global.postgres.username | b64enc }}
  SPRING_DATASOURCE_PASSWORD: {{ .Values.global.postgres.password | b64enc }}
  ACCOUNTS_SERVICE_CLIENT_SECRET: {{ .Values.global.accounts.clientSecret | default "accounts-service-secret" | b64enc }}
