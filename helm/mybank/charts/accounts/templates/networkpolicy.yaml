apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Release.Name }}-accounts
spec:
  podSelector:
    matchLabels:
      app: accounts
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              app.kubernetes.io/name: traefik
      ports:
        - port: 8081
          protocol: TCP
    - from:
        - podSelector:
            matchLabels:
              app: cash
        - podSelector:
            matchLabels:
              app: transfer
      ports:
        - port: 8081
          protocol: TCP
