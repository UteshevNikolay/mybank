services:

  consul:
    image: hashicorp/consul:1.21
    container_name: consul
    ports:
      - "8500:8500"
    command: "agent -server -bootstrap-expect=1 -ui -client=0.0.0.0"
    networks:
      - mybank-network

  keycloak:
    image: quay.io/keycloak/keycloak:26.2
    container_name: keycloak
    ports:
      - "8080:8080"
    command: "start-dev --import-realm"
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HOSTNAME: http://localhost:8080
      KC_HOSTNAME_BACKCHANNEL_DYNAMIC: "true"
    volumes:
      - ./keycloak/mybank-realm.json:/opt/keycloak/data/import/mybank-realm.json:ro
    networks:
      - mybank-network

  accounts-db:
    image: postgres:17
    container_name: accounts-db
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: accounts_db
    volumes:
      - accounts-db-data:/var/lib/postgresql/data
    networks:
      - mybank-network

  cash-db:
    image: postgres:17
    container_name: cash-db
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cash_db
    volumes:
      - cash-db-data:/var/lib/postgresql/data
    networks:
      - mybank-network

  transfer-db:
    image: postgres:17
    container_name: transfer-db
    ports:
      - "5435:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: transfer_db
    volumes:
      - transfer-db-data:/var/lib/postgresql/data
    networks:
      - mybank-network

  notifications-db:
    image: postgres:17
    container_name: notifications-db
    ports:
      - "5436:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: notifications_db
    volumes:
      - notifications-db-data:/var/lib/postgresql/data
    networks:
      - mybank-network

  gateway:
    build: ./gateway
    container_name: gateway
    ports:
      - "8090:8090"
    depends_on:
      - consul
    environment:
      SPRING_CLOUD_CONSUL_HOST: consul
    networks:
      - mybank-network

  accounts:
    build: ./accounts
    container_name: accounts
    ports:
      - "8081:8081"
    depends_on:
      - consul
      - accounts-db
      - keycloak
    environment:
      SPRING_CLOUD_CONSUL_HOST: consul
      SPRING_DATASOURCE_URL: jdbc:postgresql://accounts-db:5432/accounts_db
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://keycloak:8080/realms/mybank/protocol/openid-connect/certs
      SPRING_SECURITY_OAUTH2_CLIENT_PROVIDER_KEYCLOAK_TOKEN_URI: http://keycloak:8080/realms/mybank/protocol/openid-connect/token
    networks:
      - mybank-network

  cash:
    build: ./cash
    container_name: cash
    ports:
      - "8083:8083"
    depends_on:
      - consul
      - cash-db
      - keycloak
    environment:
      SPRING_CLOUD_CONSUL_HOST: consul
      SPRING_DATASOURCE_URL: jdbc:postgresql://cash-db:5432/cash_db
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://keycloak:8080/realms/mybank/protocol/openid-connect/certs
      SPRING_SECURITY_OAUTH2_CLIENT_PROVIDER_KEYCLOAK_TOKEN_URI: http://keycloak:8080/realms/mybank/protocol/openid-connect/token
    networks:
      - mybank-network

  transfer:
    build: ./transfer
    container_name: transfer
    ports:
      - "8084:8084"
    depends_on:
      - consul
      - transfer-db
      - keycloak
    environment:
      SPRING_CLOUD_CONSUL_HOST: consul
      SPRING_DATASOURCE_URL: jdbc:postgresql://transfer-db:5432/transfer_db
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://keycloak:8080/realms/mybank/protocol/openid-connect/certs
      SPRING_SECURITY_OAUTH2_CLIENT_PROVIDER_KEYCLOAK_TOKEN_URI: http://keycloak:8080/realms/mybank/protocol/openid-connect/token
    networks:
      - mybank-network

  notifications:
    build: ./notifications
    container_name: notifications
    ports:
      - "8085:8085"
    depends_on:
      - consul
      - notifications-db
    environment:
      SPRING_CLOUD_CONSUL_HOST: consul
      SPRING_DATASOURCE_URL: jdbc:postgresql://notifications-db:5432/notifications_db
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://keycloak:8080/realms/mybank/protocol/openid-connect/certs
    networks:
      - mybank-network

  frontend:
    build: ./frontend
    container_name: frontend
    ports:
      - "8082:8082"
    depends_on:
      - consul
      - gateway
      - accounts
      - keycloak
    environment:
      SPRING_CLOUD_CONSUL_HOST: consul
      GATEWAY_URL: http://gateway:8090
      LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_SECURITY: TRACE
      SPRING_SECURITY_OAUTH2_CLIENT_PROVIDER_KEYCLOAK_AUTHORIZATION_URI: http://localhost:8080/realms/mybank/protocol/openid-connect/auth
      SPRING_SECURITY_OAUTH2_CLIENT_PROVIDER_KEYCLOAK_TOKEN_URI: http://keycloak:8080/realms/mybank/protocol/openid-connect/token
      SPRING_SECURITY_OAUTH2_CLIENT_PROVIDER_KEYCLOAK_JWK_SET_URI: http://keycloak:8080/realms/mybank/protocol/openid-connect/certs
      SPRING_SECURITY_OAUTH2_CLIENT_PROVIDER_KEYCLOAK_USER_INFO_URI: http://keycloak:8080/realms/mybank/protocol/openid-connect/userinfo
    networks:
      - mybank-network

volumes:
  accounts-db-data:
  cash-db-data:
  transfer-db-data:
  notifications-db-data:

networks:
  mybank-network:
    driver: bridge
