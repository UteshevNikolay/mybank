spring:
  application:
    name: cash
  cloud:
    consul:
      host: localhost
      port: 8500
      discovery:
        register: true
        instance-id: ${spring.application.name}:${random.value}
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://localhost:8080/realms/mybank/protocol/openid-connect/certs
      client:
        provider:
          keycloak:
            # issuer-uri disabled for local Docker: OIDC discovery fails due to localhost vs keycloak hostname mismatch.
            # issuer-uri: http://localhost:8080/realms/mybank
            token-uri: http://localhost:8080/realms/mybank/protocol/openid-connect/token
        registration:
          cash-service:
            provider: keycloak
            client-id: cash-service
            client-secret: cash-secret
            authorization-grant-type: client_credentials
            scope: openid
  datasource:
    url: jdbc:postgresql://localhost:5434/cash_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 8083

resilience4j:
  circuitbreaker:
    configs:
      default:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
    instances:
      accounts:
        base-config: default
