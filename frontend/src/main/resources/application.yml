spring:
  application:
    name: frontend
  cloud:
    consul:
      host: localhost
      port: 8500
      discovery:
        register: true
        instance-id: ${spring.application.name}:${random.value}
  security:
    oauth2:
      client:
        provider:
          keycloak:
            # issuer-uri disabled for local Docker: OIDC discovery fails due to localhost vs keycloak hostname mismatch.
            # issuer-uri: http://localhost:8080/realms/mybank
            authorization-uri: http://localhost:8080/realms/mybank/protocol/openid-connect/auth
            token-uri: http://localhost:8080/realms/mybank/protocol/openid-connect/token
            jwk-set-uri: http://localhost:8080/realms/mybank/protocol/openid-connect/certs
            user-info-uri: http://localhost:8080/realms/mybank/protocol/openid-connect/userinfo
            user-name-attribute: preferred_username
        registration:
          keycloak:
            client-id: mybank-frontend
            client-secret: frontend-secret
            scope: openid,profile,email
            authorization-grant-type: authorization_code
            # Hardcoded for local Docker: {baseUrl} resolves to container hostname instead of localhost.
            redirect-uri: http://localhost:8082/login/oauth2/code/{registrationId}

server:
  port: 8082
  forward-headers-strategy: framework

gateway:
  url: http://localhost:8090

resilience4j:
  circuitbreaker:
    configs:
      default:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
    instances:
      accounts:
        base-config: default
      cash:
        base-config: default
      transfer:
        base-config: default
