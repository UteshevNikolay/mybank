spring:
  application:
    name: frontend
  security:
    oauth2:
      client:
        provider:
          keycloak:
            authorization-uri: ${KEYCLOAK_AUTHORIZATION_URI:http://localhost:8080/realms/mybank/protocol/openid-connect/auth}
            token-uri: ${KEYCLOAK_TOKEN_URI:http://localhost:8080/realms/mybank/protocol/openid-connect/token}
            jwk-set-uri: ${KEYCLOAK_JWK_SET_URI:http://localhost:8080/realms/mybank/protocol/openid-connect/certs}
            user-info-uri: ${KEYCLOAK_USER_INFO_URI:http://localhost:8080/realms/mybank/protocol/openid-connect/userinfo}
            user-name-attribute: preferred_username
        registration:
          keycloak:
            client-id: mybank-frontend
            client-secret: ${FRONTEND_CLIENT_SECRET:frontend-secret}
            scope: openid,profile,email
            authorization-grant-type: authorization_code
            redirect-uri: ${OAUTH2_REDIRECT_URI:http://localhost:8082/login/oauth2/code/{registrationId}}

server:
  port: 8082
  forward-headers-strategy: framework

accounts:
  url: ${ACCOUNTS_URL:http://localhost:8081}

cash:
  url: ${CASH_URL:http://localhost:8083}

transfer:
  url: ${TRANSFER_URL:http://localhost:8084}

resilience4j:
  circuitbreaker:
    configs:
      default:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
    instances:
      accounts:
        base-config: default
      cash:
        base-config: default
      transfer:
        base-config: default

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus,info,metrics
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_URL:http://localhost:9411}/api/v2/spans
